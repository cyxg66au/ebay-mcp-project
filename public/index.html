<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eBay 卖家后台</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #1a1a2e; }

  header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 0 24px; display: flex; align-items: center; gap: 16px; height: 56px; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 18px; font-weight: 700; color: #e53238; }
  header span { font-size: 13px; color: #888; }
  .refresh-btn { margin-left: auto; padding: 6px 14px; background: #e53238; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .refresh-btn:hover { background: #c0292e; }

  nav { display: flex; gap: 4px; padding: 16px 24px 0; }
  .tab { padding: 8px 20px; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 14px; font-weight: 500; background: #e0e0e0; color: #555; border: none; }
  .tab.active { background: #fff; color: #e53238; }

  .panel { display: none; background: #fff; border-radius: 0 8px 8px 8px; margin: 0 24px 24px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .panel.active { display: block; }

  .stats { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat { background: #f8f9ff; border: 1px solid #e0e6ff; border-radius: 10px; padding: 14px 20px; min-width: 140px; }
  .stat-num { font-size: 28px; font-weight: 700; color: #e53238; }
  .stat-label { font-size: 12px; color: #888; margin-top: 2px; }
  .stat.warn .stat-num { color: #f59e0b; }
  .stat.ok .stat-num { color: #10b981; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 12px; background: #f8f8f8; color: #555; font-weight: 600; border-bottom: 2px solid #eee; }
  td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
  tr:hover td { background: #fafafa; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge-warn { background: #fef3c7; color: #92400e; }
  .badge-ok { background: #d1fae5; color: #065f46; }
  .badge-new { background: #dbeafe; color: #1e40af; }

  .btn { padding: 5px 12px; border-radius: 5px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; }
  .btn-primary { background: #e53238; color: #fff; }
  .btn-primary:hover { background: #c0292e; }
  .btn-secondary { background: #f0f0f0; color: #333; }
  .btn-secondary:hover { background: #e0e0e0; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 12px; padding: 24px; width: 400px; max-width: 90vw; }
  .modal h3 { font-size: 16px; margin-bottom: 16px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; font-weight: 600; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
  .form-group textarea { min-height: 80px; resize: vertical; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }

  .loading { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }
  .error-msg { color: #e53238; font-size: 13px; padding: 12px; background: #fff5f5; border-radius: 6px; }
  .success-msg { color: #065f46; font-size: 13px; padding: 12px; background: #d1fae5; border-radius: 6px; margin-bottom: 12px; }
  .title-cell { max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .msg-body { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #555; }
</style>
</head>
<body>

<header>
  <h1>🛒 eBay 卖家后台</h1>
  <span id="last-update"></span>
  <button class="refresh-btn" onclick="refreshAll()">⟳ 刷新</button>
</header>

<nav>
  <button class="tab active" onclick="showTab('orders')">📦 待发货</button>
  <button class="tab" onclick="showTab('messages')">💬 消息</button>
  <button class="tab" onclick="showTab('inventory')">🗂 库存</button>
</nav>

<!-- 待发货 -->
<div id="tab-orders" class="panel active">
  <div id="revenue-stats" style="margin-bottom:20px;"></div>
  <div class="stats" id="order-stats"></div>
  <div id="orders-content"><div class="loading">加载中...</div></div>
</div>

<!-- 消息 -->
<div id="tab-messages" class="panel">
  <div id="messages-content"><div class="loading">加载中...</div></div>
</div>

<!-- 库存 -->
<div id="tab-inventory" class="panel">
  <div id="inventory-content"><div class="loading">加载中...</div></div>
</div>

<!-- 发货弹窗 -->
<div class="modal-overlay" id="ship-modal">
  <div class="modal">
    <h3>📬 标记发货</h3>
    <div id="ship-order-info" style="font-size:12px;color:#888;margin-bottom:14px;"></div>
    <div class="form-group">
      <label>快递单号</label>
      <input type="text" id="ship-tracking" placeholder="输入快递单号">
    </div>
    <div class="form-group">
      <label>物流公司</label>
      <select id="ship-carrier">
        <option value="Australia_Post">Australia Post</option>
        <option value="eBayPostageLabels">eBay Postage Labels</option>
        <option value="Sendle">Sendle</option>
        <option value="StarTrack">StarTrack</option>
        <option value="TNT">TNT</option>
        <option value="DHL">DHL</option>
      </select>
    </div>
    <div id="ship-msg"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('ship-modal')">取消</button>
      <button class="btn btn-primary" id="ship-confirm-btn" onclick="confirmShip()">确认发货</button>
    </div>
  </div>
</div>

<!-- 回复消息弹窗 -->
<div class="modal-overlay" id="reply-modal">
  <div class="modal">
    <h3>💬 回复买家</h3>
    <div id="reply-msg-preview" style="font-size:12px;background:#f8f8f8;padding:10px;border-radius:6px;margin-bottom:14px;color:#555;"></div>
    <div class="form-group">
      <label>回复内容</label>
      <textarea id="reply-body" placeholder="输入回复内容..."></textarea>
    </div>
    <div id="reply-msg"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('reply-modal')">取消</button>
      <button class="btn btn-primary" onclick="confirmReply()">发送</button>
    </div>
  </div>
</div>

<script>
let currentOrderId = null;
let currentMessageId = null;
const API = '';

function showTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['orders','messages','inventory'][i] === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'messages') loadMessages();
  if (name === 'inventory') loadInventory();
}

async function refreshAll() {
  await loadOrders();
  document.getElementById('last-update').textContent = '更新于 ' + new Date().toLocaleTimeString('zh');
}

// ── 待发货订单 ──────────────────────────────────────────────────────────────

async function loadOrders() {
  document.getElementById('orders-content').innerHTML = '<div class="loading">加载中...</div>';
  try {
    const r = await fetch(API + '/api/orders/pending');
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    renderOrders(data.orders || []);
  } catch(e) {
    document.getElementById('orders-content').innerHTML = `<div class="error-msg">❌ ${e.message}</div>`;
  }
}

function renderOrders(orders) {
  const today = new Date().toISOString().split('T')[0];
  const urgent = orders.filter(o => {
    const shipBy = o.lineItems?.[0]?.lineItemFulfillmentInstructions?.shipByDate?.split('T')[0];
    return shipBy && shipBy <= today;
  });
  const todayNew = orders.filter(o => o.creationDate?.startsWith(today));

  document.getElementById('order-stats').innerHTML = `
    <div class="stat warn"><div class="stat-num">${urgent.length}</div><div class="stat-label">⚠️ 今日截止</div></div>
    <div class="stat"><div class="stat-num">${orders.length}</div><div class="stat-label">📦 全部待发货</div></div>
    <div class="stat ok"><div class="stat-num">${todayNew.length}</div><div class="stat-label">🆕 今日新订单</div></div>
  `;

  if (!orders.length) {
    document.getElementById('orders-content').innerHTML = '<div class="loading">🎉 暂无待发货订单</div>';
    return;
  }

  const rows = orders.map(o => {
    const item = o.lineItems?.[0];
    const addr = o.fulfillmentStartInstructions?.[0]?.shippingStep?.shipTo?.contactAddress;
    const shipBy = item?.lineItemFulfillmentInstructions?.shipByDate?.split('T')[0];
    const isUrgent = shipBy && shipBy <= today;
    const isNew = o.creationDate?.startsWith(today);
    return `<tr>
      <td><span class="badge ${isNew ? 'badge-new' : 'badge-ok'}">${isNew ? '今日' : o.creationDate?.split('T')[0]}</span></td>
      <td style="font-size:12px;color:#888;">${o.orderId}</td>
      <td class="title-cell" title="${item?.title || ''}">${item?.title || '-'}</td>
      <td>${o.buyer?.username || '-'}<br><span style="font-size:11px;color:#aaa">${addr?.stateOrProvince || ''} ${addr?.postalCode || ''}</span></td>
      <td style="font-weight:600;">AUD ${o.pricingSummary?.total?.value || '-'}</td>
      <td><span class="badge ${isUrgent ? 'badge-warn' : 'badge-ok'}">${isUrgent ? '⚠️ ' : ''}${shipBy || '-'}</span></td>
      <td><button class="btn btn-primary" onclick="openShipModal('${o.orderId}', '${(item?.title||'').replace(/'/g,"\\'")}')">发货</button></td>
    </tr>`;
  }).join('');

  document.getElementById('orders-content').innerHTML = `
    <table>
      <thead><tr><th>日期</th><th>订单号</th><th>商品</th><th>买家</th><th>金额</th><th>截止发货</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function openShipModal(orderId, title) {
  currentOrderId = orderId;
  document.getElementById('ship-order-info').textContent = `订单 ${orderId} — ${title}`;
  document.getElementById('ship-tracking').value = '';
  document.getElementById('ship-msg').innerHTML = '';
  document.getElementById('ship-modal').classList.add('open');
}

async function confirmShip() {
  const tracking = document.getElementById('ship-tracking').value.trim();
  const carrier = document.getElementById('ship-carrier').value;
  if (!tracking) { document.getElementById('ship-msg').innerHTML = '<div class="error-msg">请输入快递单号</div>'; return; }
  const btn = document.getElementById('ship-confirm-btn');
  btn.disabled = true; btn.textContent = '处理中...';
  try {
    const r = await fetch(API + `/api/orders/${currentOrderId}/ship`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ trackingNumber: tracking, carrier })
    });
    const data = await r.json();
    if (!data.success) throw new Error(data.error || '发货失败');
    document.getElementById('ship-msg').innerHTML = '<div class="success-msg">✅ 发货成功！</div>';
    setTimeout(() => { closeModal('ship-modal'); loadOrders(); }, 1200);
  } catch(e) {
    document.getElementById('ship-msg').innerHTML = `<div class="error-msg">❌ ${e.message}</div>`;
  } finally { btn.disabled = false; btn.textContent = '确认发货'; }
}

// ── 消息 ────────────────────────────────────────────────────────────────────

async function loadMessages() {
  document.getElementById('messages-content').innerHTML = `
    <div style="text-align:center;padding:32px 20px;">
      <div style="font-size:40px;margin-bottom:12px;">💬</div>
      <div style="font-size:15px;font-weight:700;margin-bottom:8px;">eBay 买家消息</div>
      <div style="font-size:13px;color:#888;margin-bottom:20px;line-height:1.6;">
        eBay 消息 API 需要向 eBay 单独申请权限。<br>
        你可以直接在 eBay 卖家后台查看和回复消息。
      </div>
      <div style="display:flex;flex-direction:column;gap:10px;max-width:280px;margin:0 auto;">
        <a href="https://www.ebay.com.au/cnt/ViewMessage?_caprdt=1&group_type=CORE" target="_blank"
          style="display:block;padding:11px 20px;background:#e53238;color:#fff;border-radius:8px;font-size:14px;font-weight:600;text-decoration:none;">
          📨 打开 eBay 消息中心
        </a>
        <a href="https://www.ebay.com.au/mys/overview" target="_blank"
          style="display:block;padding:11px 20px;background:#f0f0f0;color:#333;border-radius:8px;font-size:14px;font-weight:600;text-decoration:none;">
          🏪 打开 eBay 卖家概览
        </a>
      </div>
    </div>`;
}

function renderMessages(messages) {
  if (!messages.length) {
    document.getElementById('messages-content').innerHTML = `
      <div style="text-align:center;padding:32px;color:#888;">
        <div style="font-size:32px;margin-bottom:12px;">💬</div>
        <div style="font-size:14px;font-weight:600;margin-bottom:8px;">暂无消息</div>
        <div style="font-size:12px;color:#aaa;">消息功能需要额外授权</div>
        <div style="margin-top:16px;text-align:left;background:#f8f8f8;border-radius:8px;padding:16px;">
          <div style="font-size:12px;font-weight:700;margin-bottom:8px;">步骤 1：点击授权链接登录 eBay</div>
          <a href="/api/auth/messaging" target="_blank" style="display:inline-block;padding:7px 16px;background:#e53238;color:#fff;border-radius:6px;font-size:12px;text-decoration:none;">🔑 打开授权页面</a>
          <div style="font-size:12px;font-weight:700;margin:12px 0 6px;">步骤 2：授权后复制地址栏里 code= 后面的内容粘贴到这里</div>
          <div style="display:flex;gap:8px;">
            <input type="text" id="auth-code-input" placeholder="v^1.1#i^1#r^1..." style="flex:1;padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:12px;">
            <button class="btn btn-primary" onclick="submitAuthCode()">确认</button>
          </div>
          <div id="auth-code-msg" style="margin-top:8px;font-size:12px;"></div>
        </div>
      </div>`;
    return;
  }
  const rows = messages.map(m => {
    const unread = m.unreadMessageCount > 0;
    const buyer = m.contactUserName || m.buyerUserName || '-';
    const subject = m.subject || m.latestMessage?.text || '-';
    const date = (m.modifiedDate || m.creationDate || '').split('T')[0];
    const id = m.conversationId || m.messageId;
    return `<tr style="${unread ? 'font-weight:600;' : ''}">
      <td>${unread ? '🔵' : '　'}</td>
      <td style="font-size:12px;color:#888;">${date}</td>
      <td>${buyer}</td>
      <td class="msg-body" title="${subject.replace(/"/g,'&quot;')}">${subject}</td>
      <td><button class="btn btn-secondary" onclick="openReplyModal('${id}', '${subject.replace(/'/g,"\\'")}')">回复</button></td>
    </tr>`;
  }).join('');
  document.getElementById('messages-content').innerHTML = `
    <table>
      <thead><tr><th></th><th>日期</th><th>买家</th><th>内容</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function openReplyModal(messageId, preview) {
  currentMessageId = messageId;
  document.getElementById('reply-msg-preview').textContent = preview.slice(0, 200);
  document.getElementById('reply-body').value = '';
  document.getElementById('reply-msg').innerHTML = '';
  document.getElementById('reply-modal').classList.add('open');
}

async function confirmReply() {
  const body = document.getElementById('reply-body').value.trim();
  if (!body) return;
  try {
    const r = await fetch(API + `/api/messages/${currentMessageId}/reply`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ body })
    });
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    document.getElementById('reply-msg').innerHTML = '<div class="success-msg">✅ 已发送</div>';
    setTimeout(() => { closeModal('reply-modal'); loadMessages(); }, 1000);
  } catch(e) {
    document.getElementById('reply-msg').innerHTML = `<div class="error-msg">❌ ${e.message}</div>`;
  }
}

// ── 库存 ────────────────────────────────────────────────────────────────────

async function loadInventory() {
  document.getElementById('inventory-content').innerHTML = '<div class="loading">加载中...</div>';
  try {
    const r = await fetch(API + '/api/inventory');
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    renderInventory(data.inventoryItems || [], data.note);
  } catch(e) {
    document.getElementById('inventory-content').innerHTML = `<div class="error-msg">❌ ${e.message}</div>`;
  }
}

function renderInventory(items, note) {
  if (!items.length) {
    document.getElementById('inventory-content').innerHTML = '<div class="loading">暂无数据</div>';
    return;
  }
  const rows = items.map((item, i) => {
    return `<tr>
      <td style="color:#aaa;font-size:12px;text-align:center;">${i+1}</td>
      <td style="font-family:monospace;font-size:12px;color:#888;">${item.sku || '-'}</td>
      <td class="title-cell" title="${item.product?.title||''}">${item.product?.title || '-'}</td>
      <td style="text-align:center;font-weight:700;">${item.totalSold}</td>
      <td style="text-align:right;color:#10b981;font-weight:600;">AUD ${item.totalRevenue?.toFixed(2)}</td>
      <td style="font-size:12px;color:#aaa;">${item.lastSold || '-'}</td>
    </tr>`;
  }).join('');
  document.getElementById('inventory-content').innerHTML = `
    <div style="font-size:12px;color:#888;margin-bottom:12px;">📦 ${note || '近期销售商品排行（按订单汇总）'}</div>
    <table>
      <thead><tr><th>#</th><th>SKU</th><th>商品名称</th><th style="text-align:center">销量</th><th style="text-align:right">销售额</th><th>最近售出</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

async function updateQty(sku, safeId) {
  const qty = parseInt(document.getElementById('qty-' + safeId).value);
  if (isNaN(qty)) return;
  try {
    const r = await fetch(API + `/api/inventory/${encodeURIComponent(sku)}/quantity`, {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ quantity: qty })
    });
    const data = await r.json();
    if (!data.success) throw new Error(data.error);
    alert(`✅ ${sku} 库存已更新为 ${qty}`);
    loadInventory();
  } catch(e) {
    alert('❌ ' + e.message);
  }
}

// ── 工具 ────────────────────────────────────────────────────────────────────

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

async function loadRevenue() {
  try {
    const r = await fetch(API + '/api/stats/today');
    const d = await r.json();
    if (d.error) throw new Error(d.error);

    const topRows = d.topItems.map(item =>
      `<tr>
        <td style="font-size:12px;color:#888;font-family:monospace">${item.sku || '-'}</td>
        <td style="font-size:13px;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${item.title}">${item.title}</td>
        <td style="text-align:center;font-weight:600">${item.qty}</td>
        <td style="text-align:right;font-weight:600;color:#10b981">AUD ${item.revenue.toFixed(2)}</td>
      </tr>`
    ).join('');

    document.getElementById('revenue-stats').innerHTML = `
      <div style="background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:18px 20px;">
        <div style="font-size:13px;font-weight:700;color:#555;margin-bottom:14px;">📊 今日营业额 · ${d.date}</div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px;">
          <div style="flex:1;min-width:130px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px 16px;">
            <div style="font-size:22px;font-weight:800;color:#10b981">AUD ${d.revenue}</div>
            <div style="font-size:11px;color:#6b7280;margin-top:2px;">总销售额</div>
          </div>
          <div style="flex:1;min-width:130px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:12px 16px;">
            <div style="font-size:22px;font-weight:800;color:#0284c7">AUD ${d.netRevenue}</div>
            <div style="font-size:11px;color:#6b7280;margin-top:2px;">到手金额</div>
          </div>
          <div style="flex:1;min-width:110px;background:#fefce8;border:1px solid #fde68a;border-radius:8px;padding:12px 16px;">
            <div style="font-size:22px;font-weight:800;color:#d97706">AUD ${d.fees}</div>
            <div style="font-size:11px;color:#6b7280;margin-top:2px;">平台手续费</div>
          </div>
          <div style="flex:1;min-width:90px;background:#f8f9ff;border:1px solid #e0e6ff;border-radius:8px;padding:12px 16px;">
            <div style="font-size:22px;font-weight:800;color:#6366f1">${d.orderCount}</div>
            <div style="font-size:11px;color:#6b7280;margin-top:2px;">今日订单</div>
          </div>
        </div>
        ${topRows ? `
        <div style="font-size:12px;font-weight:700;color:#888;margin-bottom:8px;">🏆 今日畅销商品</div>
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
          <thead><tr style="border-bottom:1px solid #f0f0f0;">
            <th style="text-align:left;padding:6px 8px;color:#aaa;font-weight:600;font-size:11px;">SKU</th>
            <th style="text-align:left;padding:6px 8px;color:#aaa;font-weight:600;font-size:11px;">商品</th>
            <th style="text-align:center;padding:6px 8px;color:#aaa;font-weight:600;font-size:11px;">数量</th>
            <th style="text-align:right;padding:6px 8px;color:#aaa;font-weight:600;font-size:11px;">销售额</th>
          </tr></thead>
          <tbody>${topRows}</tbody>
        </table>` : ''}
      </div>`;
  } catch(e) {
    document.getElementById('revenue-stats').innerHTML = `<div class="error-msg">❌ 营业额加载失败：${e.message}</div>`;
  }
}

async function submitAuthCode() {
  const code = document.getElementById('auth-code-input').value.trim();
  if (!code) return;
  document.getElementById('auth-code-msg').innerHTML = '处理中...';
  try {
    const r = await fetch('/api/auth/exchange', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code }),
    });
    const d = await r.json();
    if (d.success) {
      document.getElementById('auth-code-msg').innerHTML = '<span style="color:#10b981">✅ 授权成功！</span>';
      setTimeout(() => loadMessages(), 1000);
    } else {
      document.getElementById('auth-code-msg').innerHTML = `<span style="color:#e53238">❌ ${d.error}</span>`;
    }
  } catch(e) {
    document.getElementById('auth-code-msg').innerHTML = `<span style="color:#e53238">❌ ${e.message}</span>`;
  }
}

// 初始化
loadRevenue();
loadOrders();
document.getElementById('last-update').textContent = '更新于 ' + new Date().toLocaleTimeString('zh');
</script>
</body>
</html>
